#
## ZMK Default Config Reference
# Keep entries commented as defaults.
# Uncomment a line to apply that setting in your active config file.

## Keyboard Identity
# CONFIG_ZMK_KEYBOARD_NAME="My KB"
# CONFIG_ZMK_WPM=n

## HID / Reports
# CONFIG_ZMK_HID_INDICATORS=n

# Report type choice:
# Enable NKRO, or leave it disabled for HKRO.

# HKRO-only tuning:
# CONFIG_ZMK_HID_KEYBOARD_REPORT_SIZE=6

## Bluetooth (General)
# CONFIG_ZMK_BLE_EXPERIMENTAL_SEC=n
# CONFIG_BT_BAS=y
# CONFIG_BT_MAX_CONN=5
# CONFIG_BT_MAX_PAIRED=5

## Split Keyboard
# CONFIG_ZMK_SPLIT=n
# CONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
# CONFIG_ZMK_SPLIT_PERIPHERAL_HID_INDICATORS=n

# BLE split options:
# CONFIG_ZMK_SPLIT_BLE=y
# CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=1

## Battery / Power
# CONFIG_ZMK_BATTERY_REPORTING=n
# CONFIG_ZMK_BATTERY_REPORT_INTERVAL=60

# Power states:
# CONFIG_ZMK_IDLE_TIMEOUT=30000

# External power control:

## Pointing / KSCAN

# Eager debouncing:

## Display / Widgets
# CONFIG_ZMK_DISPLAY=n
# CONFIG_ZMK_DISPLAY_INVERT=n

# Display status screen choice (if display is enabled):
# CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y
# CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=n

# Display work queue choice (if display is enabled):
# CONFIG_ZMK_DISPLAY_WORK_QUEUE_SYSTEM=n
# CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y

# Display widgets:
# CONFIG_ZMK_WIDGET_LAYER_STATUS=y
# CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
# CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=n
# CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y
# CONFIG_ZMK_WIDGET_WPM_STATUS=n

## Lighting
# RGB underglow:
# CONFIG_ZMK_RGB_UNDERGLOW=n
# CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=y
# CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=n
# CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=n
# CONFIG_ZMK_RGB_UNDERGLOW_HUE_STEP=10
# CONFIG_ZMK_RGB_UNDERGLOW_SAT_STEP=10
# CONFIG_ZMK_RGB_UNDERGLOW_BRT_STEP=10
# CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=0
# CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=100
# CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=100
# CONFIG_ZMK_RGB_UNDERGLOW_SPD_START=3
# CONFIG_ZMK_RGB_UNDERGLOW_ON_START=y
# CONFIG_ZMK_RGB_UNDERGLOW_BRT_MIN=0
# CONFIG_ZMK_RGB_UNDERGLOW_BRT_MAX=100

# RGB effect values:
# 0 = Solid color, 1 = Breathe, 2 = Spectrum, 3 = Swirl
# CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=0

# Backlight:
# CONFIG_ZMK_BACKLIGHT=n
# CONFIG_ZMK_BACKLIGHT_BRT_STEP=20
# CONFIG_ZMK_BACKLIGHT_BRT_START=40
# CONFIG_ZMK_BACKLIGHT_ON_START=y
# CONFIG_ZMK_BACKLIGHT_AUTO_OFF_IDLE=n
# CONFIG_ZMK_BACKLIGHT_AUTO_OFF_USB=n

## Encoders (EC11)
# CONFIG_EC11=n
# CONFIG_EC11_THREAD_PRIORITY=10

# EC11 trigger mode choice (if EC11 is enabled):
# CONFIG_EC11_TRIGGER_NONE=n
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y
# CONFIG_EC11_TRIGGER_OWN_THREAD=n

## Studio / Logging
# CONFIG_ZMK_STUDIO_LOCKING=n
# CONFIG_ZMK_STUDIO_LOCK_ON_DISCONNECT=n
