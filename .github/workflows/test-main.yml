name: Run tests (main)

on:
  workflow_dispatch:
  push:
    paths:
      - "dts/**"
      - "include/**"
      - "src/**"
      - "tests/**"
  pull_request:
    paths:
      - "dts/**"
      - "include/**"
      - "src/**"
      - "tests/**"
  schedule:
    - cron: "0 21 * * 3"

jobs:
  test:
    uses: urob/zmk-actions/.github/workflows/run-tests.yml@main
    with:
      toolchain: gnuarmemb
      zmk-version: main
