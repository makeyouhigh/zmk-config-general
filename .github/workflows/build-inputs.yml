name: Build Selected Firmware

on:
  workflow_dispatch:
    inputs:
      artifact_names:
        description: "Comma-separated artifact-name values from build.yaml"
        required: true
        type: string
      build_matrix_path:
        description: "Path to the build matrix file"
        default: "build.yaml"
        required: false
        type: string
      archive_name:
        description: "Archive output file name"
        default: "firmware-selected"
        required: false
        type: string
  workflow_call:
    inputs:
      artifact_names:
        description: "Comma-separated artifact-name values from build.yaml"
        required: true
        type: string
      build_matrix_path:
        description: "Path to the build matrix file"
        default: "build.yaml"
        required: false
        type: string
      archive_name:
        description: "Archive output file name"
        default: "firmware-selected"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: build-inputs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  process-inputs:
    runs-on: ubuntu-latest
    outputs:
      build_matrix: ${{ steps.filter.outputs.build_matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter build matrix
        id: filter
        shell: bash
        env:
          ARTIFACT_NAMES: ${{ inputs.artifact_names }}
          BUILD_MATRIX_PATH: ${{ inputs.build_matrix_path }}
        run: |
          set -euo pipefail

          matrix="$(yq -oj -I0 "${BUILD_MATRIX_PATH}" | jq -c .)"
          requested="$(printf '%s' "${ARTIFACT_NAMES}" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | sed '/^$/d')"

          if [ -z "${requested}" ]; then
            echo "artifact_names must contain at least one artifact-name value." >&2
            exit 1
          fi

          names_json="$(printf '%s\n' "${requested}" | jq -Rsc 'split("\n") | map(select(length > 0))')"

          filtered="$(jq -c --argjson names "${names_json}" '
            .include = ((.include // []) | map(select((.["artifact-name"] // "") as $name | $names | index($name))))
          ' <<< "${matrix}")"

          count="$(jq '.include | length' <<< "${filtered}")"
          if [ "${count}" -eq 0 ]; then
            echo "No build targets matched: ${ARTIFACT_NAMES}" >&2
            echo "Available artifact-name values:" >&2
            jq -r '.include[]["artifact-name"] // empty' <<< "${matrix}" | sort -u >&2
            exit 1
          fi

          echo "Selected ${count} target(s):"
          jq -r '.include[]["artifact-name"] // empty' <<< "${filtered}"
          echo "build_matrix=${filtered}" >> "$GITHUB_OUTPUT"

  build:
    needs: process-inputs
    uses: ./.github/workflows/build.yml
    with:
      build_matrix: ${{ needs.process-inputs.outputs.build_matrix }}
      archive_name: ${{ inputs.archive_name }}

