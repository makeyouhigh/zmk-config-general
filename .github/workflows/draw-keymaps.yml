name: Draw ZMK keymaps

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/draw-keymaps.yml"
      - "keymap-drawer/config.yaml"
      - "boards/shields/*/*.json"
      - "boards/shields/*/*.keymap"
      - "config/*.json"
      - "config/*.keymap"
      - "config/*.dtsi"
      - "config/**/*.keymap"
      - "config/**/*.dtsi"
      - "config/**/*.h"

concurrency:
  group: draw-keymaps-${{ github.ref }}
  cancel-in-progress: true

jobs:
  keymap-drawer:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install keymap-drawer
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install keymap-drawer

      - name: Generate keymap drawings
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p draw-artifacts
          shopt -s nullglob
          keymaps=(config/*.keymap)
          rendered=0

          if [ "${#keymaps[@]}" -eq 0 ]; then
            echo "No keymap files found in config/."
            exit 1
          fi

          for keymap_file in "${keymaps[@]}"; do
            keyboard="$(basename "${keymap_file}" .keymap)"
            yaml_out="draw-artifacts/${keyboard}.yaml"
            svg_out="draw-artifacts/${keyboard}.svg"
            layout_json=""

            if [ -f "config/${keyboard}.json" ]; then
              layout_json="config/${keyboard}.json"
            elif [ -f "boards/shields/${keyboard}/${keyboard}.json" ]; then
              layout_json="boards/shields/${keyboard}/${keyboard}.json"
            elif grep -q 'continuum/matrix/34.h' "${keymap_file}" && [ -f "config/delta_omega.json" ]; then
              # Reuse shared 34-key layout for continuum 34-key wrappers.
              layout_json="config/delta_omega.json"
            fi

            keymap -c keymap-drawer/config.yaml parse -z "${keymap_file}" --virtual-layers Combos > "${yaml_out}"

            python -c "import sys, yaml; path=sys.argv[1]; data=yaml.safe_load(open(path, encoding='utf-8')) or {}; [combo.__setitem__('l', ['Combos']) for combo in (data.get('combos') or [])]; yaml.safe_dump(data, open(path, 'w', encoding='utf-8'), sort_keys=False, allow_unicode=True)" "${yaml_out}"

            if [ -n "${layout_json}" ]; then
              keymap -c keymap-drawer/config.yaml draw -j "${layout_json}" "${yaml_out}" > "${svg_out}"
            else
              keymap -c keymap-drawer/config.yaml draw "${yaml_out}" > "${svg_out}"
            fi

            rendered=$((rendered + 1))
          done

          if [ "${rendered}" -eq 0 ]; then
            echo "No keymaps rendered."
            exit 1
          fi

          ls -la draw-artifacts

      - name: Upload keymap drawings artifact
        uses: actions/upload-artifact@v4
        with:
          name: keymap-drawings
          path: draw-artifacts
          if-no-files-found: error

  keymap-pr:
    name: Create keymap drawing PR
    needs: keymap-drawer
    runs-on: ubuntu-latest
    if: ${{ github.ref != 'refs/heads/prepare-keymap-drawings' }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ZMK_ACTIONS_TOKEN != '' && secrets.ZMK_ACTIONS_TOKEN || github.token }}
          fetch-depth: 0

      - name: Download keymap drawings
        uses: actions/download-artifact@v4
        with:
          name: keymap-drawings
          path: draw-artifacts

      - name: Normalize drawing paths
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p keymap-drawer
          moved=0

          # Move only expected keymap-drawer outputs for config/*.keymap.
          for keymap in config/*.keymap; do
            kb="$(basename "$keymap" .keymap)"

            for ext in svg yaml; do
              src="$(find draw-artifacts -type f -name "${kb}.${ext}" | head -n1 || true)"
              if [ -n "${src}" ]; then
                mv "$src" "keymap-drawer/${kb}.${ext}"
                moved=$((moved + 1))
              fi
            done
          done

          if [ "$moved" -eq 0 ]; then
            echo "No expected keymap artifacts were found."
            exit 1
          fi

          echo "Staged drawing files:"
          ls -la keymap-drawer

      - name: Detect changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          git add keymap-drawer/*.svg keymap-drawer/*.yaml 2>/dev/null || true
          echo "count=$(git status --porcelain=v1 -- keymap-drawer | wc -l)" >> "$GITHUB_OUTPUT"

      - name: Commit and push changes
        if: steps.changes.outputs.count > 0
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git checkout -B prepare-keymap-drawings
          git commit -m "[Draw] Refresh keymap diagrams"
          git push -f origin HEAD:prepare-keymap-drawings

      - name: Open pull request if needed
        if: steps.changes.outputs.count > 0
        env:
          GH_TOKEN: ${{ secrets.ZMK_ACTIONS_TOKEN != '' && secrets.ZMK_ACTIONS_TOKEN || github.token }}
        shell: bash
        run: |
          set -euo pipefail
          PR=$(gh pr list \
            --head prepare-keymap-drawings \
            --base "${{ github.event.repository.default_branch }}" \
            --json number -q '.[0].number')

          if [ -z "$PR" ]; then
            PR_BODY=$(printf 'Automated keymap drawing refresh.\n\nSource run: https://github.com/%s/actions/runs/%s\n' "${{ github.repository }}" "${{ github.run_id }}")
            LABEL_ARGS=()
            EXISTING_LABELS="$(gh label list --limit 200 --json name -q '.[].name' || true)"

            for label in dependencies automation; do
              if printf '%s\n' "$EXISTING_LABELS" | grep -Fxq "$label"; then
                LABEL_ARGS+=(--label "$label")
              else
                echo "Label '$label' not found; creating PR without it."
              fi
            done

            gh pr create \
              --base "${{ github.event.repository.default_branch }}" \
              --head prepare-keymap-drawings \
              --title "[Draw] Refresh keymap diagrams" \
              "${LABEL_ARGS[@]}" \
              --body "$PR_BODY"
          else
            echo "Pull request already exists (#$PR), skipped creating a new one."
          fi
