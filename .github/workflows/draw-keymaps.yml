name: Draw ZMK keymaps

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/draw-keymaps.yml"
      - "keymap-drawer/config.yaml"
      - "boards/shields/*/*.json"
      - "boards/shields/*/*.keymap"
      - "config/*.json"
      - "config/*.keymap"
      - "config/*.dtsi"
      - "config/**/*.keymap"
      - "config/**/*.dtsi"
      - "config/**/*.h"

concurrency:
  group: draw-keymaps-${{ github.ref }}
  cancel-in-progress: true

jobs:
  keymap-drawer:
    uses: caksoylar/keymap-drawer/.github/workflows/draw-zmk.yml@main
    permissions:
      contents: read
    with:
      fail_on_error: true
      install_branch: "main"
      keymap_patterns: "config/*.keymap"
      config_path: "keymap-drawer/config.yaml"
      json_path: "boards/shields/${keyboard}"
      output_folder: "keymap-drawer"
      destination: "artifact"
      artifact_name: "keymap-drawings"
      draw_args: "rommana:'--ghost-keys 0 9 26 29'"

  keymap-pr:
    name: Create keymap drawing PR
    needs: keymap-drawer
    runs-on: ubuntu-latest
    if: ${{ github.ref != 'refs/heads/prepare-keymap-drawings' }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ZMK_ACTIONS_TOKEN != '' && secrets.ZMK_ACTIONS_TOKEN || github.token }}
          fetch-depth: 0

      - name: Download keymap drawings
        uses: actions/download-artifact@v4
        with:
          name: keymap-drawings
          path: .draw-artifacts

      - name: Normalize drawing paths
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p keymap-drawer
          moved=0

          # Move only expected keymap-drawer outputs for config/*.keymap.
          for keymap in config/*.keymap; do
            kb="$(basename "$keymap" .keymap)"

            for ext in svg yaml; do
              src="$(find .draw-artifacts -type f -name "${kb}.${ext}" | head -n1 || true)"
              if [ -n "${src}" ]; then
                mv "$src" "keymap-drawer/${kb}.${ext}"
                moved=$((moved + 1))
              fi
            done
          done

          if [ "$moved" -eq 0 ]; then
            echo "No expected keymap artifacts were found."
            exit 1
          fi

          echo "Staged drawing files:"
          ls -la keymap-drawer

      - name: Detect changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          git add keymap-drawer/*.svg keymap-drawer/*.yaml 2>/dev/null || true
          echo "count=$(git status --porcelain=v1 -- keymap-drawer | wc -l)" >> "$GITHUB_OUTPUT"

      - name: Commit and push changes
        if: steps.changes.outputs.count > 0
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git checkout -B prepare-keymap-drawings
          git commit -m "[Draw] Refresh keymap diagrams"
          git push -f origin HEAD:prepare-keymap-drawings

      - name: Open pull request if needed
        if: steps.changes.outputs.count > 0
        env:
          GH_TOKEN: ${{ secrets.ZMK_ACTIONS_TOKEN != '' && secrets.ZMK_ACTIONS_TOKEN || github.token }}
        shell: bash
        run: |
          set -euo pipefail
          PR=$(gh pr list \
            --head prepare-keymap-drawings \
            --base "${{ github.event.repository.default_branch }}" \
            --json number -q '.[0].number')

          if [ -z "$PR" ]; then
            PR_BODY=$(printf 'Automated keymap drawing refresh.\n\nSource run: https://github.com/%s/actions/runs/%s\n' "${{ github.repository }}" "${{ github.run_id }}")
            LABEL_ARGS=()
            EXISTING_LABELS="$(gh label list --limit 200 --json name -q '.[].name' || true)"

            for label in dependencies automation; do
              if printf '%s\n' "$EXISTING_LABELS" | grep -Fxq "$label"; then
                LABEL_ARGS+=(--label "$label")
              else
                echo "Label '$label' not found; creating PR without it."
              fi
            done

            gh pr create \
              --base "${{ github.event.repository.default_branch }}" \
              --head prepare-keymap-drawings \
              --title "[Draw] Refresh keymap diagrams" \
              "${LABEL_ARGS[@]}" \
              --body "$PR_BODY"
          else
            echo "Pull request already exists (#$PR), skipped creating a new one."
          fi
