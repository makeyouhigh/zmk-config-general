name: Run tests (release)

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/test-main.yml"
      - ".github/workflows/test-release.yml"
      - "build.yaml"
      - "boards/**"
      - "config/**"
      - "config/west.yml"
      - "dts/**"
      - "include/**"
      - "src/**"
      - "tests/**"
  pull_request:
    paths:
      - ".github/workflows/test-main.yml"
      - ".github/workflows/test-release.yml"
      - "build.yaml"
      - "boards/**"
      - "config/**"
      - "config/west.yml"
      - "dts/**"
      - "include/**"
      - "src/**"
      - "tests/**"

concurrency:
  group: test-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    uses: urob/zmk-actions/.github/workflows/run-tests.yml@main
    with:
      toolchain: gnuarmemb
