# This file generates the GitHub Actions matrix.
# For simple board + shield combinations, add them to the top level board and
# shield arrays, for more control, add individual board + shield combinations
# to the `include` property. You can also use the `cmake-args` property to
# pass flags to the build command, `snippet` to add a Zephyr snippet, and
# `artifact-name` to assign a name to distinguish build outputs from each other:
#
# board: [ "nice_nano" ]
# shield: [ "corne_left", "corne_right" ]
# include:
#   - board: bdn9_rev2
#   - board: nice_nano
#     shield: reviung41
#   - board: nice_nano
#     shield: corne_left
#     snippet: studio-rpc-usb-uart
#     cmake-args: -DCONFIG_ZMK_STUDIO=y
#     artifact-name: corne_left_with_studio
#
---
include:
  # TOTEM
  - board: seeeduino_xiao_ble
    shield: totem_left
    snippet: common-config studio-rpc-usb-uart
    artifact-name: totem_left
  - board: seeeduino_xiao_ble
    shield: totem_right
    artifact-name: totem_right

  # Urchin
  - board: nice_nano_v2
    shield: urchin_left nice_view_adapter nice_view_gem
    snippet: common-config studio-rpc-usb-uart
    artifact-name: urchin_left
  - board: nice_nano_v2
    shield: urchin_right nice_view_adapter nice_view_gem
    artifact-name: urchin_right
  - board: nice_nano_v2
    shield: settings_reset
    artifact-name: urchin_reset

  # Corne
  - board: nice_nano_v2
    shield: corne_left nice_view_adapter nice_view
    snippet: common-config studio-rpc-usb-uart
    artifact-name: corne_left
  - board: nice_nano_v2
    shield: corne_right nice_view_adapter nice_view
    artifact-name: corne_right
  - board: nice_nano_v2
    shield: settings_reset
    artifact-name: corne_reset

  # Eyelash Corne
  - board: eyelash_corne_left
    shield: nice_view
    snippet: common-config studio-rpc-usb-uart
    artifact-name: eyelash_corne_left
  - board: eyelash_corne_right
    shield: nice_view
    artifact-name: eyelash_corne_right
  - board: nice_nano_v2
    shield: settings_reset
    artifact-name: eyelash_corne_reset

  # Sofle
  - board: nice_nano_v2
    shield: sofle_left nice_view_adapter nice_view
    snippet: common-config studio-rpc-usb-uart
    artifact-name: sofle_left
  - board: nice_nano_v2
    shield: sofle_right nice_view_adapter nice_view
    artifact-name: sofle_right
  - board: nice_nano_v2
    shield: settings_reset
    artifact-name: sofle_reset

  # Eyelash Sofle
  - board: eyelash_sofle_left
    shield: nice_view
    snippet: common-config studio-rpc-usb-uart
    artifact-name: eyelash_sofle_left
  - board: eyelash_sofle_right
    shield: nice_view
    artifact-name: eyelash_sofle_right
  - board: nice_nano_v2
    shield: settings_reset
    artifact-name: eyelash_sofle_reset

  # Delta Omega
  - board: seeeduino_xiao_ble
    shield: delta_omega_left
    snippet: common-config studio-rpc-usb-uart
    artifact-name: delta_omega_left
  - board: seeeduino_xiao_ble
    shield: delta_omega_right
    artifact-name: delta_omega_right
  - board: seeeduino_xiao_ble
    shield: settings_reset
    artifact-name: delta_omega_reset

  # Cornix
  - board: cornix_left
    # shield: cornix_indicator
    snippet: common-config studio-rpc-usb-uart
    artifact-name: cornix_left
  - board: cornix_right
    # shield: cornix_indicator
    artifact-name: cornix_right
  - board: cornix_right
    shield: settings_reset
    artifact-name: cornix_reset
