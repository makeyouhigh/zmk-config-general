# This file generates the GitHub Actions matrix.
# For simple board + shield combinations, add them to the top level board and
# shield arrays, for more control, add individual board + shield combinations
# to the `include` property. You can also use the `cmake-args` property to
# pass flags to the build command, `snippet` to add a Zephyr snippet, and
# `artifact-name` to assign a name to distinguish build outputs from each other:
#
# board: [ "nice_nano" ]
# shield: [ "corne_left", "corne_right" ]
# include:
#   - board: bdn9_rev2
#   - board: nice_nano
#     shield: reviung41
#   - board: nice_nano
#     shield: corne_left
#     snippet: studio-rpc-usb-uart
#     cmake-args: -DCONFIG_ZMK_STUDIO=y
#     artifact-name: corne_left_with_studio
#
---
include:
  # TOTEM
  - board: seeeduino_xiao_ble
    shield: totem_left
    snippet: common-config studio-rpc-usb-uart
    artifact-name: totem_left
  - board: seeeduino_xiao_ble
    shield: totem_right
    artifact-name: totem_right
  - board: seeeduino_xiao_ble
    shield: totem_left_w_dongle
    artifact-name: totem_left_w_dongle
  - board: nice_nano_v2
    shield: totem_dongle
    snippet: common-config studio-rpc-usb-uart
    artifact-name: totem_dongle
  - board: nice_nano_v2
    shield: totem_dongle zdd_adapter dongle_display
    snippet: common-config studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_KEYBOARD_NAME=\"TOTEM\ ZDD\"
    artifact-name: totem_zdd_dongle

  # Urchin
  - board: nice_nano_v2
    shield: urchin_left nice_view_adapter nice_view_gem
    snippet: common-config studio-rpc-usb-uart
    artifact-name: urchin_left
  - board: nice_nano_v2
    shield: urchin_right nice_view_adapter nice_view_gem
    artifact-name: urchin_right
  - board: nice_nano_v2
    shield: urchin_left_w_dongle nice_view_adapter nice_view_gem
    artifact-name: urchin_left_w_dongle
  - board: nice_nano_v2
    shield: urchin_dongle
    snippet: common-config studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_DISPLAY=n -DCONFIG_DISPLAY=n -DCONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=n
    artifact-name: urchin_dongle
  - board: nice_nano_v2
    shield: urchin_dongle zdd_adapter dongle_display
    snippet: common-config studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_KEYBOARD_NAME=\"Urchin\ ZDD\"
    artifact-name: urchin_zdd_dongle

  # Corne
  - board: nice_nano_v2
    shield: corne_left nice_view_adapter nice_view
    snippet: common-config studio-rpc-usb-uart
    artifact-name: corne_left
  - board: nice_nano_v2
    shield: corne_right nice_view_adapter nice_view
    artifact-name: corne_right
  - board: nice_nano_v2
    shield: corne_left nice_view_adapter nice_view
    cmake-args: -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
    artifact-name: corne_left_w_dongle
  - board: nice_nano_v2
    shield: corne_dongle
    snippet: common-config studio-rpc-usb-uart
    artifact-name: corne_dongle
  - board: nice_nano_v2
    shield: corne_dongle zdd_adapter dongle_display
    snippet: common-config studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_KEYBOARD_NAME=\"Corne\ ZDD\"
    artifact-name: corne_zdd_dongle

  # Eyelash Corne
  - board: eyelash_corne_left
    shield: nice_view
    snippet: common-config studio-rpc-usb-uart
    artifact-name: eyelash_corne_left
  - board: eyelash_corne_right
    shield: nice_view
    artifact-name: eyelash_corne_right
  - board: eyelash_corne_left
    shield: nice_view
    cmake-args: -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
    artifact-name: eyelash_corne_left_w_dongle
  - board: nice_nano_v2
    shield: eyelash_corne_dongle
    snippet: common-config studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_DISPLAY=n -DCONFIG_DISPLAY=n -DCONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=n
    artifact-name: eyelash_corne_dongle
  - board: nice_nano_v2
    shield: eyelash_corne_dongle zdd_adapter dongle_display
    snippet: common-config studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_KEYBOARD_NAME=\"EyelashCorneZDD\"
    artifact-name: eyelash_corne_zdd_dongle

  # Sofle
  - board: nice_nano_v2
    shield: sofle_left nice_view_adapter nice_view
    snippet: common-config sofle-sides-config studio-rpc-usb-uart
    artifact-name: sofle_left
  - board: nice_nano_v2
    shield: sofle_right nice_view_adapter nice_view
    snippet: sofle-sides-config
    artifact-name: sofle_right
  - board: nice_nano_v2
    shield: sofle_left nice_view_adapter nice_view
    snippet: sofle-sides-config
    cmake-args: -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
    artifact-name: sofle_left_w_dongle
  - board: nice_nano_v2
    shield: sofle_dongle
    snippet: common-config studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_DISPLAY=n -DCONFIG_DISPLAY=n -DCONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=n
    artifact-name: sofle_dongle
  - board: nice_nano_v2
    shield: sofle_dongle zdd_adapter dongle_display
    snippet: common-config studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_KEYBOARD_NAME=\"Sofle\ ZDD\"
    artifact-name: sofle_zdd_dongle

  # Eyelash Sofle
  - board: eyelash_sofle_left
    shield: nice_view
    snippet: common-config studio-rpc-usb-uart
    artifact-name: eyelash_sofle_left
  - board: eyelash_sofle_right
    shield: nice_view
    artifact-name: eyelash_sofle_right
  - board: eyelash_sofle_left
    shield: nice_view
    cmake-args: -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
    artifact-name: eyelash_sofle_left_w_dongle
  - board: nice_nano_v2
    shield: eyelash_sofle_dongle
    snippet: common-config studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_DISPLAY=n -DCONFIG_DISPLAY=n -DCONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=n
    artifact-name: eyelash_sofle_dongle
  - board: nice_nano_v2
    shield: eyelash_sofle_dongle zdd_adapter dongle_display
    snippet: common-config studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_KEYBOARD_NAME=\"EyelashSofleZDD\"
    artifact-name: eyelash_sofle_zdd_dongle

  # Delta Omega
  - board: seeeduino_xiao_ble
    shield: delta_omega_left
    snippet: common-config studio-rpc-usb-uart
    artifact-name: delta_omega_left
  - board: seeeduino_xiao_ble
    shield: delta_omega_right
    artifact-name: delta_omega_right
  - board: seeeduino_xiao_ble
    shield: delta_omega_left_w_dongle
    artifact-name: delta_omega_left_w_dongle
  - board: nice_nano_v2
    shield: delta_omega_dongle
    snippet: common-config studio-rpc-usb-uart
    artifact-name: delta_omega_dongle
  - board: nice_nano_v2
    shield: delta_omega_dongle zdd_adapter dongle_display
    snippet: common-config studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_KEYBOARD_NAME=\"Delta\ Omega\ ZDD\"
    artifact-name: delta_omega_zdd_dongle

  # Cornix
  - board: cornix_left
    # shield: cornix_indicator
    snippet: common-config studio-rpc-usb-uart
    artifact-name: cornix_left
  - board: cornix_right
    # shield: cornix_indicator
    artifact-name: cornix_right
  - board: cornix_left
    cmake-args: -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
    artifact-name: cornix_left_w_dongle
  - board: nice_nano_v2
    shield: cornix_dongle
    snippet: common-config studio-rpc-usb-uart
    artifact-name: cornix_dongle
  - board: nice_nano_v2
    shield: cornix_dongle zdd_adapter dongle_display
    snippet: common-config studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_KEYBOARD_NAME=\"Cornix\ ZDD\"
    artifact-name: cornix_zdd_dongle

  # Shared reset artifacts
  - board: nice_nano_v2
    shield: settings_reset
    artifact-name: reset_nice_nano_v2
  - board: seeeduino_xiao_ble
    shield: settings_reset
    artifact-name: reset_seeeduino_xiao_ble

  # Prospector Dongle
  - board: seeeduino_xiao_ble
    shield: totem_dongle prospector_adapter
    snippet: common-config studio-rpc-usb-uart prospector-config
    cmake-args: -DCONFIG_ZMK_KEYBOARD_NAME=\"TOTEM\ PRSP\"
    artifact-name: totem_prospector_dongle
  - board: seeeduino_xiao_ble
    shield: urchin_dongle prospector_adapter
    snippet: common-config studio-rpc-usb-uart prospector-config
    cmake-args: -DCONFIG_ZMK_KEYBOARD_NAME=\"Urchin\ PRSP\"
    artifact-name: urchin_prospector_dongle
  - board: seeeduino_xiao_ble
    shield: corne_dongle prospector_adapter
    snippet: common-config studio-rpc-usb-uart prospector-config
    cmake-args: -DCONFIG_ZMK_KEYBOARD_NAME=\"Corne\ PRSP\"
    artifact-name: corne_prospector_dongle
  - board: seeeduino_xiao_ble
    shield: eyelash_corne_dongle prospector_adapter
    snippet: common-config studio-rpc-usb-uart prospector-config
    cmake-args: -DCONFIG_ZMK_KEYBOARD_NAME=\"ELCornePRSP\"
    artifact-name: eyelash_corne_prospector_dongle
  - board: seeeduino_xiao_ble
    shield: sofle_dongle prospector_adapter
    snippet: common-config studio-rpc-usb-uart prospector-config
    cmake-args: -DCONFIG_ZMK_KEYBOARD_NAME=\"Sofle\ PRSP\"
    artifact-name: sofle_prospector_dongle
  - board: seeeduino_xiao_ble
    shield: eyelash_sofle_dongle prospector_adapter
    snippet: common-config studio-rpc-usb-uart prospector-config
    cmake-args: -DCONFIG_ZMK_KEYBOARD_NAME=\"ELSoflePRSP\"
    artifact-name: eyelash_sofle_prospector_dongle
  - board: seeeduino_xiao_ble
    shield: delta_omega_dongle prospector_adapter
    snippet: common-config studio-rpc-usb-uart prospector-config
    cmake-args: -DCONFIG_ZMK_KEYBOARD_NAME=\"DeltaOmegaPRSP\"
    artifact-name: delta_omega_prospector_dongle
  - board: seeeduino_xiao_ble
    shield: cornix_dongle prospector_adapter
    snippet: common-config studio-rpc-usb-uart prospector-config
    cmake-args: -DCONFIG_ZMK_KEYBOARD_NAME=\"Cornix\ PRSP\"
    artifact-name: cornix_prospector_dongle
