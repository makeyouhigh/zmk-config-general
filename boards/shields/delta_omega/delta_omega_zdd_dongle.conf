# dongle mode
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

# No RGB LED aliases on this dongle target (nice_nano_v2 + dongle_display).
# Keep per-keyboard RGBLED widget enabled on left/right builds only.
CONFIG_RGBLED_WIDGET=n

# display
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DONGLE_DISPLAY_WPM=y
CONFIG_BT_BAS=n
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
