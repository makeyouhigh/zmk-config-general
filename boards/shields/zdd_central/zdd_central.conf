# central role for shared dongle topology
CONFIG_ZMK_BLE=y
# Keep at least one host BLE profile:
# ZMK_BLE_PROFILE_COUNT = BT_MAX_PAIRED - ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS
CONFIG_BT_MAX_CONN=7
CONFIG_BT_MAX_PAIRED=7
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=6

# display
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DONGLE_DISPLAY_WPM=y
CONFIG_BT_BAS=n
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
